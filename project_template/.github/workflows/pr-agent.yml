name: PR-Agent Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: PR-Agent Review
        uses: qodo-ai/pr-agent@latest
        env:
          OPENROUTER__KEY: ${{ secrets.OPENROUTER_KEY }}
